<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Inventory Asset Management System</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <h1>Inventory Asset Management System</h1>

    <div class="buttons">
        <button onclick="loadHealth()">Health</button>
        <button onclick="loadAssets()">Assets</button>
        <button onclick="loadEmployees()">Employees</button>
        <button onclick="loadProcurement()">Procurement</button>
        <button onclick="loadReport()">Report</button>
    </div>

    <div class="form-section">
        <h2>Create Asset</h2>

        <input type="text" id="asset_name" placeholder="Asset Name">

        <input type="number" id="category_id" placeholder="Category ID">

        <input type="number" id="employee_id" placeholder="Employee ID">

        <select id="asset_status">
            <option value="available">available</option>
            <option value="assigned">assigned</option>
        </select>

        <button onclick="createAsset()">Create Asset</button>
    </div>

    <pre id="result"></pre>

    <script src="js/script.js"></script>

</body>
</html>
