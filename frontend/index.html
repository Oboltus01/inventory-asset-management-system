<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Inventory Asset Management System</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <h1>Inventory Asset Management System</h1>

    <div class="buttons">
        <button onclick="loadHealth()">Health</button>
        <button onclick="loadAssets()">Assets</button>
        <button onclick="loadEmployees()">Employees</button>
        <button onclick="loadProcurement()">Procurement</button>
        <button onclick="loadReport()">Report</button>
    </div>

    <div class="form-section">
        <h2>Create Asset</h2>

        <form id="asset_form" onsubmit="createAsset(event)">
            <input type="text" id="asset_name" placeholder="Asset Name" required>

            <select id="category_id" required>
                <option value="">Select Category</option>
            </select>

            <select id="employee_id">
                <option value="">Not assigned</option>
            </select>

            <input type="text" id="asset_location" placeholder="Location">

            <select id="asset_status">
                <option value="available">available</option>
                <option value="assigned">assigned</option>
                <option value="maintenance">maintenance</option>
                <option value="retired">retired</option>
            </select>

            <button type="submit">Create Asset</button>
            <button type="button" onclick="resetAssetForm()">Clear</button>
        </form>

        <p id="asset_form_message" class="form-message"></p>
    </div>

    <div class="form-section">
        <h2>Create Employee</h2>

        <form id="employee_form" onsubmit="createEmployee(event)">
            <input type="text" id="employee_full_name" placeholder="Full Name" required>

            <input type="email" id="employee_email" placeholder="Email" required>

            <input type="text" id="employee_department" placeholder="Department">

            <input type="text" id="employee_position" placeholder="Position">

            <button type="submit">Create Employee</button>
            <button type="button" onclick="resetEmployeeForm()">Clear</button>
        </form>

        <p id="employee_form_message" class="form-message"></p>
    </div>

    <div class="form-section">
        <h2>Create Procurement Request</h2>

        <form id="procurement_form" onsubmit="createProcurement(event)">
            <select id="procurement_employee_id" required>
                <option value="">Select Employee</option>
            </select>

            <select id="procurement_category_id" required>
                <option value="">Select Category</option>
            </select>

            <input type="text" id="procurement_item_name" placeholder="Item Name" required>

            <input type="text" id="procurement_reason" placeholder="Reason">

            <select id="procurement_status">
                <option value="new">new</option>
                <option value="approved">approved</option>
                <option value="rejected">rejected</option>
                <option value="purchased">purchased</option>
            </select>

            <button type="submit">Create Request</button>
            <button type="button" onclick="resetProcurementForm()">Clear</button>
        </form>

        <p id="procurement_form_message" class="form-message"></p>
    </div>

    <div id="result"></div>

    <script src="js/script.js"></script>

</body>
</html>
